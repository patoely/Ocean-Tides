<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <title>Ocean Tides – Tickets</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color:#ffffff; }
    .ot-logo { height:200px; width:auto; }
    .ot-center { text-align:center; }
  </style>
</head>
<body>
<div class="container py-4" id="app"></div>

<script>
const USERS = [
  { id: 'daniel1', email: 'patoely@gmail.com', password: '123', name: 'Daniel 1' },
  { id: 'daniel2', email: 'daniel.engemann@oceanoutdoor.de', password: '123', name: 'Daniel 2' }
];

const LS_TICKETS_KEY = 'ocean-tides-tickets';
const LS_USER_KEY    = 'ocean-tides-current-user';
const MAIL_ENDPOINT  = 'https://mailer.digidashdesign.de/ocean-tides-mail.php'; // dein PHP-Mailer

function getTickets() {
  return JSON.parse(localStorage.getItem(LS_TICKETS_KEY)) || [];
}
function saveTickets(t) {
  localStorage.setItem(LS_TICKETS_KEY, JSON.stringify(t));
}
function getCurrentUser() {
  const email = localStorage.getItem(LS_USER_KEY);
  return USERS.find(u => u.email === email) || null;
}
function setCurrentUser(email) {
  if (email) localStorage.setItem(LS_USER_KEY, email);
  else localStorage.removeItem(LS_USER_KEY);
}

// generische Mail-Funktion
async function sendMail({ to, subject, message, replyTo }) {
  try {
    const res = await fetch(MAIL_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ to, subject, message, replyTo })
    });
    const data = await res.json().catch(() => null);
    if (!res.ok || !data || !data.ok) {
      console.warn('Mail send failed', res.status, data);
    }
  } catch (err) {
    console.warn('Mail request error', err);
  }
}

function render() {
  const app = document.getElementById('app');
  const user = getCurrentUser();
  app.innerHTML = renderMain(user);
  attachHandlers(user);
}

// Kopfbereich
function renderHeader(user) {
  return `
    <div class="d-flex justify-content-end mb-2">
      <div>
        ${user ? `
          <div class="text-end">
            <div class="small mb-2">${user.email}</div>
            <button class="btn btn-outline-secondary btn-sm" id="logoutBtn">Logout</button>
          </div>
        ` : `
          <div class="text-end">
            <button class="btn btn-outline-primary btn-sm" data-bs-toggle="collapse" data-bs-target="#loginBox">
              Mitarbeiter-Login
            </button>
          </div>
        `}
      </div>
    </div>
    ${renderLoginBox()}
  `;
}

function renderLoginBox() {
  return `
    <div class="collapse mb-4" id="loginBox">
      <div class="card p-3 shadow-sm">
        <form id="loginForm" class="row g-3">
          <div class="col-md-5">
            <label class="form-label">E-Mail</label>
            <input type="email" class="form-control" id="loginEmail" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Passwort</label>
            <input type="password" class="form-control" id="loginPassword" required>
          </div>
          <div class="col-md-3 d-flex align-items-end">
            <button class="btn btn-primary w-100" type="submit">Login</button>
          </div>
        </form>
        <small class="text-muted d-block mt-2">
          Testuser: daniel1 / patoely@gmail.com / 123 · daniel2 / daniel.engemann@oceanoutdoor.de / 123
        </small>
      </div>
    </div>
  `;
}

// Ticket-Erstellen nur für nicht eingeloggte
function renderTicketCreateForm() {
  const options = USERS.map(u => `<option value="${u.email}">${u.name} (${u.email})</option>`).join('');
  return `
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="ot-center mb-3">
          <img src="images/logo.png" alt="Ocean Tides Logo" class="ot-logo mb-2">
          <h5>Ticket erstellen</h5>
          <p class="text-muted small mb-3">
            Name und E-Mail angeben, Empfänger und Dringlichkeit wählen – das Ticket wird direkt angelegt.
          </p>
        </div>
        <form id="createForm" class="card p-3 shadow-sm mb-4">
          <div class="mb-2">
            <label class="form-label">Dein Name</label>
            <input id="cName" class="form-control" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Deine E-Mail</label>
            <input id="cEmail" type="email" class="form-control" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Empfänger</label>
            <select id="cTo" class="form-select" required>
              <option value="">Bitte wählen</option>
              ${options}
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label">Dringlichkeit</label>
            <select id="cPriority" class="form-select" required>
              <option value="low">Niedrig</option>
              <option value="medium" selected>Mittel</option>
              <option value="high">Hoch</option>
            </select>
          </div>
          <div class="mb-2">
            <label class="form-label">Titel</label>
            <input id="cTitle" class="form-control" required>
          </div>
          <div class="mb-2">
            <label class="form-label">Beschreibung</label>
            <textarea id="cDesc" class="form-control" rows="4" required></textarea>
          </div>
          <button class="btn btn-primary w-100" type="submit">Ticket senden</button>
        </form>
      </div>
    </div>
  `;
}

// Übersicht nur für eingeloggte
function renderMyTickets(user) {
  if (!user) {
    return `
      <div id="myTickets" class="ot-center text-muted small mb-2"></div>
      <div id="ticketDetail"></div>
    `;
  }
  const tickets = getTickets().filter(t => t.toEmail === user.email);
  tickets.sort((a,b) => b.id - a.id);
  const items = tickets.length ? tickets.map(t => {
    const prioLabel = t.priority === 'high' ? 'Hoch' : t.priority === 'medium' ? 'Mittel' : 'Niedrig';
    return `
    <li class="list-group-item">
      <div class="d-flex justify-content-between align-items-start">
        <div>
          <strong>${t.title}</strong><br>
          <small>Von: ${t.fromName} &lt;${t.fromEmail}&gt;</small><br>
          <small>Prio: ${prioLabel} · Status: ${t.status}${t.dueDate ? ' · Fällig: ' + t.dueDate : ''}</small>
        </div>
        <button class="btn btn-sm btn-outline-primary" data-ticket="${t.id}" data-action="open">Öffnen</button>
      </div>
    </li>`;
  }).join('') : `<li class="list-group-item text-muted">Keine Tickets zugewiesen.</li>`;
  return `
    <div class="ot-center mb-2">
      <h5>Meine Tickets</h5>
    </div>
    <ul class="list-group mb-3" id="myTickets">${items}</ul>
    <div id="ticketDetail"></div>
  `;
}

function renderMain(user) {
  return `
    ${renderHeader(user)}
    ${user ? '' : renderTicketCreateForm()}
    ${user ? `
      <div class="row mt-3">
        <div class="col-md-10 col-lg-8 mx-auto">
          ${renderMyTickets(user)}
        </div>
      </div>
    ` : ''}
  `;
}

function attachHandlers(user) {
  if (user) {
    const logoutBtn = document.getElementById('logoutBtn');
    if (logoutBtn) logoutBtn.onclick = () => { setCurrentUser(null); render(); };
  }
  const loginForm = document.getElementById('loginForm');
  if (loginForm) {
    loginForm.addEventListener('submit', e => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const pw    = document.getElementById('loginPassword').value.trim();
      const u     = USERS.find(x => x.email === email && x.password === pw);
      if (!u) { alert('Login fehlgeschlagen'); return; }
      setCurrentUser(u.email);
      render();
    });
  }

  const createForm = document.getElementById('createForm');
  if (createForm) {
    createForm.addEventListener('submit', async e => {
      e.preventDefault();
      const fromName  = document.getElementById('cName').value.trim();
      const fromEmail = document.getElementById('cEmail').value.trim();
      const toEmail   = document.getElementById('cTo').value;
      const priority  = document.getElementById('cPriority').value;
      const title     = document.getElementById('cTitle').value.trim();
      const desc      = document.getElementById('cDesc').value.trim();
      if (!fromName || !fromEmail || !toEmail || !title || !desc) return;
      const tickets = getTickets();
      const id = Date.now();
      const ticket = {
        id,
        fromName,
        fromEmail,
        toEmail,
        priority,
        title,
        description: desc,
        status: 'open',
        dueDate: null,
        messages: []
      };
      tickets.push(ticket);
      saveTickets(tickets);
      alert('Ticket wurde erstellt.');

      // Mail an Empfänger
      const prioLabel = priority === 'high' ? 'Hoch' : priority === 'medium' ? 'Mittel' : 'Niedrig';
      const msg =
        `Neues Ticket in Ocean Tides\n\n` +
        `Titel: ${title}\n` +
        `Von: ${fromName} <${fromEmail}>\n` +
        `Dringlichkeit: ${prioLabel}\n\n` +
        `${desc}\n`;
      sendMail({
        to: toEmail,
        subject: `Neues Ticket: ${title}`,
        message: msg,
        replyTo: fromEmail
      });

      e.target.reset();
    });
  }

  const myTicketsList = document.getElementById('myTickets');
  if (user && myTicketsList) {
    myTicketsList.addEventListener('click', e => {
      const btn = e.target.closest('button[data-ticket]');
      if (!btn) return;
      const id = Number(btn.getAttribute('data-ticket'));
      openTicketDetail(id, user);
    });
  }
}

function openTicketDetail(id, user) {
  const tickets = getTickets();
  const t = tickets.find(x => x.id === id);
  if (!t || !user) return;

  const userOptions = USERS.map(u =>
    `<option value="${u.email}" ${u.email===t.toEmail?'selected':''}>${u.name}</option>`
  ).join('');

  const msgs = t.messages.length ? t.messages.map(m => `
    <div class="border rounded p-2 mb-2">
      <small class="text-muted">${m.from}</small><br>
      <div>${m.text}</div>
      <small class="text-muted">${new Date(m.timestamp).toLocaleString('de-DE')}</small>
    </div>
  `).join('') : '<p class="text-muted">Noch keine Diskussion.</p>';

  const prioLabel = t.priority === 'high' ? 'Hoch' : t.priority === 'medium' ? 'Mittel' : 'Niedrig';

  const detail = document.getElementById('ticketDetail');
  detail.innerHTML = `
    <div class="card p-3 mt-2">
      <h5>${t.title}</h5>
      <p>${t.description}</p>
      <p><small>Von: ${t.fromName} &lt;${t.fromEmail}&gt; · Prio: ${prioLabel}</small></p>
      <div class="row mb-3">
        <div class="col-md-4">
          <label class="form-label">Zugewiesen an</label>
          <select id="detailAssignee" class="form-select">${userOptions}</select>
        </div>
        <div class="col-md-4">
          <label class="form-label">Fällig bis</label>
          <input type="date" id="detailDue" class="form-control" value="${t.dueDate || ''}">
        </div>
        <div class="col-md-4 d-flex align-items-end">
          <button class="btn btn-outline-primary me-2" id="saveDue">Datum & Mail</button>
          <button class="btn btn-${t.status==='open'?'success':'secondary'}" id="toggleStatus">
            ${t.status === 'open' ? 'Ticket schließen' : 'Wieder öffnen'}
          </button>
        </div>
      </div>
      <h6>Diskussion</h6>
      <div id="messages" class="mb-2">${msgs}</div>
      <div class="input-group mb-2">
        <textarea id="msgText" class="form-control" rows="2" placeholder="Rückfrage oder Antwort..."></textarea>
        <button class="btn btn-outline-primary" id="sendMsg">Senden & Mail</button>
      </div>
    </div>
  `;

  document.getElementById('detailAssignee').onchange = (e) => {
    t.toEmail = e.target.value;
    saveTickets(tickets);
  };

  document.getElementById('saveDue').onclick = async () => {
    const due = document.getElementById('detailDue').value || null;
    t.dueDate = due;
    saveTickets(tickets);

    // Mail an Ticketersteller
    const msg =
      `Update zu deinem Ticket "${t.title}"\n\n` +
      `Voraussichtliches Fertigstellungsdatum: ${t.dueDate || 'kein Datum'}\n\n` +
      `Viele Grüße\nOcean Tides`;
    await sendMail({
      to: t.fromEmail,
      subject: `Ticket-Update: ${t.title}`,
      message: msg,
      replyTo: user.email
    });
  };

  document.getElementById('toggleStatus').onclick = () => {
    t.status = t.status === 'open' ? 'closed' : 'open';
    saveTickets(tickets);
    render();
  };

  document.getElementById('sendMsg').onclick = async () => {
    const text = document.getElementById('msgText').value.trim();
    if (!text) return;
    t.messages.push({ from: user.email, text, timestamp: Date.now() });
    saveTickets(tickets);
    const other = user.email === t.toEmail ? t.fromEmail : t.toEmail;

    const msg =
      `Neue Nachricht zu Ticket "${t.title}"\n\n` +
      `${user.email} schreibt:\n\n` +
      `${text}\n\n` +
      `Bitte im Ocean Tides Ticket antworten.`;
    await sendMail({
      to: other,
      subject: `Neue Nachricht zu Ticket: ${t.title}`,
      message: msg,
      replyTo: user.email
    });

    openTicketDetail(id, user);
  };
}

render();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
